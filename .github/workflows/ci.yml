name: CI

on:
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: Test
        run: go test ./...

      - name: Race Test
        if: matrix.os == 'ubuntu-latest'
        run: go test -race ./...

      - name: Build
        run: go build ./...
